name: data
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip

  # 以下通过 pip 安装
  - pip:
    # ── Django 核心 ─────────────────────────────────────────
    - Django>=4.2,<5.0
    - djangorestframework>=3.14.0
    - django-cors-headers>=4.3.0
    - django-filter>=23.0
    - djangorestframework-simplejwt>=5.3.0

    # ── 环境变量 ────────────────────────────────────────────
    - python-dotenv>=1.0.0

    # ── 数据库驱动 ──────────────────────────────────────────
    - pymysql>=1.1.0
    - pymongo>=4.6.0

    # ── Redis + Celery ──────────────────────────────────────
    - redis>=5.0.0
    - celery>=5.3.0

    # ── 数据处理 ────────────────────────────────────────────
    - pandas>=2.0.0
    - numpy>=1.24.0
    - scipy>=1.11.0

    # ── 机器学习 ────────────────────────────────────────────
    - scikit-learn>=1.3.0
    - joblib>=1.3.0

    # ── 图像处理 ────────────────────────────────────────────
    - Pillow>=10.0.0

    # ── 报告生成 ────────────────────────────────────────────
    - jinja2>=3.1.0
    - markdown>=3.5.0

    # ── 工具 ────────────────────────────────────────────────
    - requests>=2.31.0
    - tqdm>=4.66.0
